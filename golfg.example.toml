# go LFG — example configuration.
#
# Copy this file to "golfg.toml" (next to the binary) and adjust, or inject any
# value via environment variable using the scheme GOLFG_<SECTION>_<KEY>,
# e.g. GOLFG_TEAMS_WEBHOOK_URL. ENV always overrides the file.
#
# The real golfg.toml and .env are gitignored — never commit secrets.

[app]
host = "0.0.0.0"                      # bind address (replaces the old hardcoded IP)
port = 9000
base_url = "http://localhost:9000"   # public URL, used for deep-links in Teams posts

[auth]                               # leave empty = dev mode without SSO
tenant_id = ""
client_id = ""
client_secret = ""                   # prefer ENV: GOLFG_AUTH_CLIENT_SECRET
fetch_photos = true                  # pull each user's own M365 profile photo at login (delegated Graph User.Read, user-consentable); set false to skip Graph entirely

[teams]                              # leave empty = Teams posts are only logged
webhook_url = ""                     # prefer ENV: GOLFG_TEAMS_WEBHOOK_URL
lang = "en"                          # language for channel notifications: "en" or "de"
mention_players = true               # @-mention drawn players in the "teams are set" post (SSO users only); set false to disable pings

[session]
expire_minutes = 30                  # open sessions auto-expire after this many minutes
cookie_secure = false                # set true in production behind HTTPS (Secure-only auth cookie)

[branding]                           # white-label the UI (no secrets — safe to commit)
app_name = "go LFG"                  # shown in header, page title and footer
accent_color = "#0f766e"             # any CSS color; drives buttons, header and highlights
play_cta = ""                        # custom "I want to play" button label (fixed literal, not translated); empty = localized default
play_announcement = ""               # custom Teams "session started" headline; text/template with {{.Name}}, e.g. "{{.Name}} wants to play!"; empty = localized default
