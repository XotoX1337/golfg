{{ define "header" }}
<!DOCTYPE html>
<html lang="{{ .Lang }}" data-theme="light">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/css/app.min.css"/>
    <script defer src="/js/htmx.min.js#1.9.5"></script>
    <title>{{ Name }}</title>
</head>
<body>
    <header>
        <nav class="container">
            <ul>
                <li><strong style="color:white">{{ Name }}</strong></li>
                {{ if .DevMode }}
                <li><small style="color:#fff;background:#dc3545;padding:2px 8px;border-radius:4px">DEV MODE</small></li>
                {{ end }}
            </ul>
            {{ if .CurrentUser }}
            <ul>
                <li style="color:white">{{ .CurrentUser.DisplayName }}</li>
                <li><a href="/auth/logout" role="button" class="secondary">{{ call .T "nav_logout" }}</a></li>
            </ul>
            {{ end }}
        </nav>
    </header>
    <main class="container">
{{ end }}
{{ define "footer" }}
    </main>
    <footer>
        <p>{{ Name }} {{ Version }}</p>
    </footer>
</body>
</html>
{{ end }}
