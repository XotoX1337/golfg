{{ template "header" . }}
<article class="narrow auth-card">
    <hgroup>
        <h2>{{ call .T "login_title" }}</h2>
        <p>{{ call .T "login_subtitle" }}</p>
    </hgroup>

    {{ if .DevMode }}
    <p class="dev-note"><i class="ri-information-line"></i> {{ call .T "login_dev_note" }}</p>
    {{ end }}

    {{ if .ErrorKey }}
    <p class="form-error" role="alert">{{ call .T .ErrorKey }}</p>
    {{ end }}

    <form method="post" action="/auth/dev-login">
        <label>
            {{ call .T "login_name" }}
            <input name="name" placeholder="{{ call .T "login_name_placeholder" }}" autocomplete="name" required autofocus/>
        </label>
        <label>
            {{ call .T "login_email" }} <small>{{ call .T "login_optional" }}</small>
            <input type="email" name="email" placeholder="anton@example.com" autocomplete="email"/>
        </label>
        <button type="submit">{{ call .T "login_continue" }}</button>
    </form>
</article>
{{ template "footer" . }}
